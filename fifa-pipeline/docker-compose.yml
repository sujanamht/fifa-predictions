version: "3.9"

# ============================================================
# FIFA Pipeline — Docker Compose
# Services: PostgreSQL | Airflow Webserver | Airflow Scheduler
#           | Streamlit Dashboard
#
# Start everything:  docker-compose up --build
# Stop everything:   docker-compose down
# Wipe DB volumes:   docker-compose down -v
# ============================================================

x-airflow-common: &airflow-common
  # Use the official Airflow image with Python 3.10
  image: apache/airflow:2.9.2-python3.10
  env_file:
    - .env
  environment:
    # Point Airflow at our shared Postgres instance
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://fifa_user:fifa_pass123@postgres:5432/fifa_db
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIigo=
    AIRFLOW__WEBSERVER__SECRET_KEY: supersecretkey
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"   # Don't clutter UI with example DAGs
  volumes:
    - ./airflow/dags:/opt/airflow/dags          # Our custom DAGs
    - ./data:/opt/airflow/data                  # Shared data folder
    - ./models:/opt/airflow/models              # Trained model artifacts
    - ./dbt:/opt/airflow/dbt                    # dbt project
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy               # Wait until Postgres is ready

services:

  # ----------------------------------------------------------
  # PostgreSQL — primary storage for raw tables, features, predictions
  # ----------------------------------------------------------
  postgres:
    image: postgres:15.6
    container_name: fifa_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"                            # Expose to host so notebooks can connect
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist DB across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Airflow — DB migration + user creation (runs once then exits)
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: fifa_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname FIFA \
          --lastname Admin \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # ----------------------------------------------------------
  # Airflow Webserver — UI at http://localhost:8080
  # Login: admin / admin
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: fifa_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Airflow Scheduler — executes DAG tasks
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: fifa_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------------------------------------
  # Streamlit Dashboard — http://localhost:8501
  # ----------------------------------------------------------
  streamlit:
    image: python:3.10-slim
    container_name: fifa_streamlit
    working_dir: /app
    volumes:
      - ./dashboard:/app                        # Dashboard source code
      - ./models:/app/models                    # Access trained model
      - ./.env:/app/.env                        # Secrets
    env_file:
      - .env
    environment:
      # Inside Docker, "postgres" resolves to the postgres container
      POSTGRES_HOST: postgres
    command: >
      bash -c "pip install streamlit==1.35.0 plotly==5.22.0 pandas==2.2.2
               psycopg2-binary==2.9.9 sqlalchemy==2.0.30 python-dotenv==1.0.1 --quiet &&
               streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:   # Named volume — survives docker-compose down (not down -v)
  airflow_logs:
