version: 2

models:

  # ----------------------------------------------------------
  # mart_team_form
  # ----------------------------------------------------------
  - name: mart_team_form
    description: >
      Aggregated form metrics for every international team.
      Built from the last 10 and last 20 matches per team.
      Materialized as a TABLE so downstream queries are fast.
      Used by: mart_predictions_input (Phase 4 ML input)
    columns:

      - name: team
        description: "Team name (normalized)"
        tests:
          - not_null
          - unique

      - name: last_match_date
        description: "Date of the team's most recent recorded match"
        tests:
          - not_null

      - name: matches_last10
        description: "Number of matches in the last-10 sample (may be <10 for new teams)"
        tests:
          - not_null

      - name: wins_last10
        description: "Number of wins in last 10 matches"
        tests:
          - not_null

      - name: draws_last10
        description: "Number of draws in last 10 matches"
        tests:
          - not_null

      - name: losses_last10
        description: "Number of losses in last 10 matches"
        tests:
          - not_null

      - name: win_rate_last10
        description: "Win fraction in last 10 matches (0.0–1.0). Core ML feature."
        tests:
          - not_null

      - name: avg_goals_scored_last10
        description: "Average goals scored per match in last 10 matches"
        tests:
          - not_null

      - name: avg_goals_conceded_last10
        description: "Average goals conceded per match in last 10 matches"
        tests:
          - not_null

      - name: avg_goal_diff_last10
        description: "Average (goals_for - goals_against) in last 10 matches"
        tests:
          - not_null

      - name: matches_last20
        description: "Number of matches in the last-20 sample"

      - name: avg_goals_scored_last20
        description: "Average goals scored per match in last 20 matches"

      - name: avg_goals_conceded_last20
        description: "Average goals conceded per match in last 20 matches"

      - name: goal_diff_trend
        description: >
          avg_gd_last5 minus avg_gd_prev5.
          Positive = team is improving (goal diff getting better).
          Negative = team is declining.


  # ----------------------------------------------------------
  # mart_head_to_head
  # ----------------------------------------------------------
  - name: mart_head_to_head
    description: >
      All-time head-to-head record for every team pair.
      Pairs are normalized alphabetically: team_a < team_b always.
      One row per unique pair. Includes World Cup-specific breakdown.
    columns:

      - name: team_a
        description: "Alphabetically first team in the pair"
        tests:
          - not_null

      - name: team_b
        description: "Alphabetically second team in the pair"
        tests:
          - not_null

      - name: total_matches
        description: "Total number of matches between this pair"
        tests:
          - not_null

      - name: team_a_wins
        description: "Wins by team_a against team_b (all time)"
        tests:
          - not_null

      - name: team_b_wins
        description: "Wins by team_b against team_a (all time)"
        tests:
          - not_null

      - name: draws
        description: "Number of draws between this pair (all time)"
        tests:
          - not_null

      - name: team_a_win_rate
        description: "team_a wins / total_matches. ML feature for H2H dominance."

      - name: draw_rate
        description: "draws / total_matches"

      - name: world_cup_meetings
        description: "Times these teams have met specifically at the FIFA World Cup"

      - name: first_meeting
        description: "Date of earliest recorded match between this pair"

      - name: last_meeting
        description: "Date of most recent match between this pair"


  # ----------------------------------------------------------
  # mart_predictions_input
  # ----------------------------------------------------------
  - name: mart_predictions_input
    description: >
      Final ML-ready input table.
      Each row is one 2026 WC group stage fixture enriched with:
        - Home and away team form metrics (last 10/20 matches)
        - H2H historical win rates and counts
        - Derived ranking scores for both teams
        - Computed feature differentials (strength_diff, rank_diff, etc.)
      This table is the ONLY input the ML model needs.
    columns:

      - name: fixture_id
        description: "Unique fixture identifier (e.g. WC26-GA-01)"
        tests:
          - not_null
          - unique

      - name: home_team
        description: "Home (or first-listed) team"
        tests:
          - not_null

      - name: away_team
        description: "Away (or second-listed) team"
        tests:
          - not_null

      - name: match_date
        description: "Scheduled match date"
        tests:
          - not_null

      - name: group_name
        description: "World Cup group letter"
        tests:
          - not_null

      - name: home_win_rate_last10
        description: "Home team win fraction in last 10 matches (0.0–1.0)"
        tests:
          - not_null

      - name: away_win_rate_last10
        description: "Away team win fraction in last 10 matches (0.0–1.0)"
        tests:
          - not_null

      - name: home_draw_rate_last10
        description: "Home team draw fraction in last 10 matches (0.0–1.0)"
        tests:
          - not_null

      - name: away_draw_rate_last10
        description: "Away team draw fraction in last 10 matches (0.0–1.0)"
        tests:
          - not_null

      - name: home_avg_goals_scored_last20
        description: "Home team average goals scored per match in last 20 matches"
        tests:
          - not_null

      - name: away_avg_goals_scored_last20
        description: "Away team average goals scored per match in last 20 matches"
        tests:
          - not_null

      - name: home_avg_goals_conceded_last20
        description: "Home team average goals conceded per match in last 20 matches"
        tests:
          - not_null

      - name: away_avg_goals_conceded_last20
        description: "Away team average goals conceded per match in last 20 matches"
        tests:
          - not_null

      - name: home_avg_goal_diff_last10
        description: "Home team average goal differential in last 10 matches"
        tests:
          - not_null

      - name: away_avg_goal_diff_last10
        description: "Away team average goal differential in last 10 matches"
        tests:
          - not_null

      - name: home_ranking_proxy
        description: "Home team derived ranking score (0–100, FIFA-style points %)"
        tests:
          - not_null

      - name: away_ranking_proxy
        description: "Away team derived ranking score (0–100, FIFA-style points %)"
        tests:
          - not_null

      - name: home_ranking_change
        description: "Home team ranking change (currently 0.0 — placeholder for future live rankings feed)"
        tests:
          - not_null

      - name: away_ranking_change
        description: "Away team ranking change (currently 0.0 — placeholder for future live rankings feed)"
        tests:
          - not_null

      - name: h2h_total
        description: "Total prior meetings between these two teams"
        tests:
          - not_null

      - name: h2h_team_a_win_rate
        description: "Win rate of the alphabetically-first team (team_a) across all H2H matches"
        tests:
          - not_null

      - name: strength_diff
        description: >
          home_ranking_proxy minus away_ranking_proxy.
          Positive = home team is stronger on this proxy ranking.
        tests:
          - not_null

      - name: rank_diff
        description: >
          away_derived_rank minus home_derived_rank.
          Positive = home team ranks higher (a better rank number).
        tests:
          - not_null
